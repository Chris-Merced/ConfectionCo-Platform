spring.application.name=confectionco
server.port=${PORT:8080}

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=50MB
spring.datasource.url=${JDBC_DATABASE_URL:${DB_URL}}
spring.datasource.username=${JDBC_DATABASE_USERNAME:${DB_USERNAME}}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:${DB_PASSWORD}}

app.base-url=${APP_BASE_URL:http://localhost:5173}
app.owner-phone=${OWNER_PHONE:}
stripe.api.key=${STRIPE_API_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.security.oauth2.resourceserver.jwt.issuer-uri=${AUTH0_ISSUER_URI}
spring.security.oauth2.resourceserver.jwt.audiences=${AUTH0_AUDIENCE}

aws.access-key=${AWS_ACCESS_KEY_ID}
aws.secret-key=${AWS_SECRET_ACCESS_KEY}
aws.region=${AWS_REGION}
aws.bucket-assets=${AWS_BUCKET_ASSETS}
aws.bucket-inspo=${AWS_BUCKET_INSPO}
aws.bucket-url=${AWS_BUCKET_URL}

spring.jpa.open-in-view=false
