name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Type check
        working-directory: client
        run: npx tsc --noEmit

      - name: Build
        working-directory: client
        run: npm run build

  backend:
    name: Backend Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: confectionco_test
          POSTGRES_USER: confectionco
          POSTGRES_PASSWORD: ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - name: Run tests
        working-directory: server
        env:
          DB_URL: jdbc:postgresql://localhost:5432/confectionco_test
          DB_USERNAME: confectionco
          DB_PASSWORD: ci_password
          RESEND_API_KEY: dummy_ci_key
          TWILIO_ACCOUNT_SID: dummy_account_sid
          TWILIO_AUTH_TOKEN: dummy_auth_token
          STRIPE_WEBHOOK_SECRET: whsec_xx
          STRIPE_API_KEY: your_key
          EMAIL: confectioncobakery.com
          AWS_ACCESS_KEY_ID: aws_access_key_id
          AWS_SECRET_ACCESS_KEY: aws_secret_access_key
          AWS_REGION: us-east-2
          AWS_BUCKET_ASSETS: aws_bucket_assets
          AWS_BUCKET_INSPO: aws_bucket_inspo
          AWS_BUCKET_URL: aws_bucket
          APP_BASE_URL: dummyUrl
        run: |
          chmod +x mvnw
          ./mvnw -DskipFrontend=true test
